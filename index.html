<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Mis Horas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F1320">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Horas">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0F1320;
    --surface:#1A1F2E;
    --surface-2:#232A3D;
    --amber:#FF8A3D;
    --amber-soft:#FFD9B3;
    --cream:#F4EFE6;
    --muted:#8891A6;
    --green:#4ADE80;
    --red-soft:#F87171;
    --border:rgba(255,255,255,0.07);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--night);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    padding:20px 16px 48px;
    padding-top:calc(20px + env(safe-area-inset-top));
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:600;
    margin:0 0 4px;
  }
  .title{
    font-size:22px;
    font-weight:700;
    margin:0 0 20px;
    color:var(--cream);
  }
  .timer-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:22px 20px 20px;
    margin-bottom:22px;
  }
  .horizon{
    position:relative;
    height:6px;
    border-radius:6px;
    background:linear-gradient(90deg, #0B0E18, var(--amber-soft));
    margin-bottom:18px;
    overflow:visible;
  }
  .horizon-fill{
    position:absolute;
    top:0; left:0; bottom:0;
    width:0%;
    background:rgba(15,19,32,0.78);
    border-radius:6px;
    transition:width 1s linear;
  }
  .sun{
    position:absolute;
    top:50%;
    left:0%;
    width:14px;
    height:14px;
    margin-left:-7px;
    margin-top:-7px;
    border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 12px 3px rgba(255,138,61,0.65);
    transition:left 1s linear;
  }
  .clock-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .clock{
    font-family:'Space Mono',monospace;
    font-size:40px;
    font-weight:700;
    letter-spacing:0.01em;
    color:var(--cream);
  }
  .status-pill{
    font-size:11px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:5px 10px;
    border-radius:999px;
  }
  .status-pill.running{
    background:rgba(255,138,61,0.15);
    color:var(--amber);
  }
  .status-pill.stopped{
    background:rgba(136,145,166,0.15);
    color:var(--muted);
  }
  .sub-row{
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
  }
  .sub-row b{ color:var(--cream); font-weight:600; }
  .btn-main{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    font-family:'Inter',sans-serif;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:transform 0.1s ease, opacity 0.15s ease;
  }
  .btn-main:active{ transform:scale(0.98); }
  .btn-main.start{
    background:var(--amber);
    color:#1A0E03;
  }
  .btn-main.stop{
    background:transparent;
    color:var(--cream);
    border:1.5px solid rgba(244,239,230,0.25);
  }
  .target-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid var(--border);
  }
  .target-row label{
    font-size:13px;
    color:var(--muted);
  }
  .target-row input{
    width:64px;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--cream);
    font-family:'Space Mono',monospace;
    font-size:14px;
    text-align:center;
    padding:6px 4px;
    border-radius:8px;
  }
  .manual-toggle{
    display:block;
    width:100%;
    text-align:center;
    background:none;
    border:none;
    color:var(--muted);
    font-size:13px;
    font-weight:600;
    padding:6px 0 18px;
    cursor:pointer;
  }
  .manual-form{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    margin-bottom:18px;
    display:none;
  }
  .manual-form.open{ display:block; }
  .manual-form .field{ margin-bottom:12px; }
  .manual-form label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:5px;
  }
  .manual-form input{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:10px 12px;
    border-radius:10px;
  }
  .manual-form .btn-save{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--amber);
    color:#1A0E03;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .section-label{
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin:0 0 12px;
  }
  .day-group{ margin-bottom:18px; }
  .day-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:8px;
    padding-bottom:6px;
    border-bottom:1px solid var(--border);
  }
  .day-header .day-name{
    font-size:14px;
    font-weight:600;
    color:var(--cream);
    text-transform:capitalize;
  }
  .day-header .day-total{
    font-family:'Space Mono',monospace;
    font-size:13px;
    color:var(--amber-soft);
  }
  .session-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 2px;
  }
  .session-row .range{ font-size:13.5px; color:var(--cream); }
  .session-row .dur{
    font-family:'Space Mono',monospace;
    font-size:12.5px;
    color:var(--muted);
    margin-left:8px;
  }
  .session-row .del{
    background:none;
    border:none;
    color:var(--muted);
    font-size:16px;
    cursor:pointer;
    padding:4px 6px;
    line-height:1;
  }
  .session-row .del:active{ color:var(--red-soft); }
  .row-left{ display:flex; align-items:center; flex:1; min-width:0; }
  .empty-state{
    text-align:center;
    color:var(--muted);
    font-size:13.5px;
    padding:30px 10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
  }
  .grand-total{
    text-align:center;
    font-size:12.5px;
    color:var(--muted);
    margin-top:6px;
    padding-top:14px;
    border-top:1px solid var(--border);
  }
  .grand-total b{ color:var(--amber-soft); font-family:'Space Mono',monospace; }
  .install-banner{
    display:none;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:18px;
    font-size:13px;
    color:var(--muted);
  }
  .install-banner.show{ display:block; }
  .install-banner b{ color:var(--cream); }
</style>
</head>
<body>
<div id="app">
  <p class="eyebrow">Amazon Flex · FedEx VMD1</p>
  <h1 class="title">Mis Horas</h1>

  <div class="install-banner" id="installBanner">
    Para guardarla en tu pantalla de inicio: abre el menú del navegador (⋮ o el ícono de compartir) y toca <b>"Agregar a pantalla de inicio"</b>.
  </div>

  <div class="timer-card">
    <div class="horizon">
      <div class="horizon-fill" id="horizonFill"></div>
      <div class="sun" id="sun"></div>
    </div>
    <div class="clock-row">
      <span class="clock" id="clock">00:00:00</span>
      <span class="status-pill stopped" id="statusPill">Detenido</span>
    </div>
    <div class="sub-row" id="subRow">Hoy: 0h 0m</div>
    <button class="btn-main start" id="mainBtn">Comenzar</button>
    <div class="target-row">
      <label for="targetInput">Meta por bloque (horas)</label>
      <input type="number" id="targetInput" min="0.5" step="0.5" value="4">
    </div>
  </div>

  <button class="manual-toggle" id="manualToggle">+ Agregar un bloque manualmente</button>
  <div class="manual-form" id="manualForm">
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="manDate">
    </div>
    <div class="field">
      <label>Hora de inicio</label>
      <input type="time" id="manStart">
    </div>
    <div class="field">
      <label>Hora de fin</label>
      <input type="time" id="manEnd">
    </div>
    <button class="btn-save" id="manSave">Guardar bloque</button>
  </div>

  <p class="section-label">Historial</p>
  <div id="history"></div>
</div>

<script>
(function(){
  var sessions = [];
  var active = null;
  var targetHours = 4;
  var tickInterval = null;

  var clockEl = document.getElementById('clock');
  var statusPill = document.getElementById('statusPill');
  var subRow = document.getElementById('subRow');
  var mainBtn = document.getElementById('mainBtn');
  var horizonFill = document.getElementById('horizonFill');
  var sun = document.getElementById('sun');
  var targetInput = document.getElementById('targetInput');
  var historyEl = document.getElementById('history');
  var manualToggle = document.getElementById('manualToggle');
  var manualForm = document.getElementById('manualForm');
  var manSave = document.getElementById('manSave');
  var installBanner = document.getElementById('installBanner');

  var dayNames = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var monthNames = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  function pad(n){ return n < 10 ? '0'+n : ''+n; }

  function fmtClock(ms){
    var totalSec = Math.floor(ms/1000);
    var h = Math.floor(totalSec/3600);
    var m = Math.floor((totalSec%3600)/60);
    var s = totalSec%60;
    return pad(h)+':'+pad(m)+':'+pad(s);
  }
  function fmtDuration(ms){
    var totalMin = Math.round(ms/60000);
    var h = Math.floor(totalMin/60);
    var m = totalMin%60;
    if(h <= 0) return m+'m';
    return h+'h '+m+'m';
  }
  function fmtTime(ts){
    var d = new Date(ts);
    var h = d.getHours();
    var m = d.getMinutes();
    var ampm = h >= 12 ? 'pm' : 'am';
    var h12 = h % 12;
    if(h12 === 0) h12 = 12;
    return h12+':'+pad(m)+' '+ampm;
  }
  function dateKey(ts){
    var d = new Date(ts);
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function dayLabel(key){
    var parts = key.split('-').map(Number);
    var d = new Date(parts[0], parts[1]-1, parts[2]);
    var todayKey = dateKey(Date.now());
    var yestKey = dateKey(Date.now() - 86400000);
    var name = dayNames[d.getDay()];
    var datePart = d.getDate()+' '+monthNames[d.getMonth()];
    if(key === todayKey) return 'Hoy · '+datePart;
    if(key === yestKey) return 'Ayer · '+datePart;
    return name+' · '+datePart;
  }

  // --- Almacenamiento local real (sobrevive cierres de la app/navegador) ---
  function storeGet(key){
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  function storeSet(key, val){
    try{ localStorage.setItem(key, val); }catch(e){ console.error('No se pudo guardar', key, e); }
  }
  function storeDelete(key){
    try{ localStorage.removeItem(key); }catch(e){}
  }

  function loadAll(){
    var s = storeGet('fedex-sessions');
    sessions = s ? JSON.parse(s) : [];
    var a = storeGet('fedex-active');
    active = a ? JSON.parse(a) : null;
    var t = storeGet('fedex-target');
    targetHours = t ? parseFloat(t) : 4;
    targetInput.value = targetHours;
    render();
    if(active){ startTicking(); }
  }
  function saveSessions(){ storeSet('fedex-sessions', JSON.stringify(sessions)); }
  function saveActive(){
    if(active) storeSet('fedex-active', JSON.stringify(active));
    else storeDelete('fedex-active');
  }
  function saveTarget(){ storeSet('fedex-target', String(targetHours)); }

  function todaysTotalMs(){
    var key = dateKey(Date.now());
    var total = 0;
    sessions.forEach(function(s){
      if(dateKey(s.start) === key) total += s.duration;
    });
    if(active && dateKey(active.start) === key){
      total += (Date.now() - active.start);
    }
    return total;
  }

  function render(){
    var elapsed = active ? (Date.now() - active.start) : 0;
    clockEl.textContent = fmtClock(elapsed);
    if(active){
      statusPill.textContent = 'En curso';
      statusPill.className = 'status-pill running';
      mainBtn.textContent = 'Detener';
      mainBtn.className = 'btn-main stop';
    }else{
      statusPill.textContent = 'Detenido';
      statusPill.className = 'status-pill stopped';
      mainBtn.textContent = 'Comenzar';
      mainBtn.className = 'btn-main start';
    }
    subRow.innerHTML = 'Hoy: <b>'+fmtDuration(todaysTotalMs())+'</b> · Meta '+targetHours+'h por bloque';
    var pct = targetHours > 0 ? Math.min(100, (elapsed/(targetHours*3600000))*100) : 0;
    horizonFill.style.width = (100-pct)+'%';
    sun.style.left = pct+'%';
    renderHistory();
  }

  function renderHistory(){
    if(sessions.length === 0){
      historyEl.innerHTML = '<div class="empty-state">Todavía no hay bloques guardados. Cuando termines uno, va a aparecer aquí.</div>';
      return;
    }
    var byDay = {};
    sessions.forEach(function(s){
      var k = dateKey(s.start);
      if(!byDay[k]) byDay[k] = [];
      byDay[k].push(s);
    });
    var keys = Object.keys(byDay).sort().reverse();
    var html = '';
    var grandTotal = 0;
    keys.forEach(function(k){
      var daySessions = byDay[k].sort(function(a,b){ return b.start - a.start; });
      var dayTotal = 0;
      var rows = '';
      daySessions.forEach(function(s){
        dayTotal += s.duration;
        rows += '<div class="session-row">'+
          '<div class="row-left"><span class="range">'+fmtTime(s.start)+' – '+fmtTime(s.end)+'</span>'+
          '<span class="dur">'+fmtDuration(s.duration)+'</span></div>'+
          '<button class="del" data-id="'+s.id+'" aria-label="Eliminar bloque">✕</button>'+
        '</div>';
      });
      grandTotal += dayTotal;
      html += '<div class="day-group">'+
        '<div class="day-header"><span class="day-name">'+dayLabel(k)+'</span>'+
        '<span class="day-total">'+fmtDuration(dayTotal)+'</span></div>'+
        rows+
      '</div>';
    });
    html += '<div class="grand-total">Total guardado: <b>'+fmtDuration(grandTotal)+'</b></div>';
    historyEl.innerHTML = html;
    historyEl.querySelectorAll('.del').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-id');
        sessions = sessions.filter(function(s){ return s.id !== id; });
        saveSessions();
        render();
      });
    });
  }

  function startTicking(){
    if(tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(render, 1000);
  }
  function stopTicking(){
    if(tickInterval){ clearInterval(tickInterval); tickInterval = null; }
  }

  mainBtn.addEventListener('click', function(){
    if(active){
      var end = Date.now();
      sessions.push({
        id: 'sess_'+Date.now(),
        start: active.start,
        end: end,
        duration: end - active.start
      });
      active = null;
      stopTicking();
      saveSessions();
      saveActive();
      render();
    }else{
      active = { start: Date.now() };
      saveActive();
      startTicking();
      render();
    }
  });

  targetInput.addEventListener('change', function(){
    var v = parseFloat(targetInput.value);
    if(isNaN(v) || v <= 0) v = 4;
    targetHours = v;
    saveTarget();
    render();
  });

  manualToggle.addEventListener('click', function(){
    manualForm.classList.toggle('open');
    if(manualForm.classList.contains('open')){
      var now = new Date();
      document.getElementById('manDate').value = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
    }
  });

  manSave.addEventListener('click', function(){
    var dateVal = document.getElementById('manDate').value;
    var startVal = document.getElementById('manStart').value;
    var endVal = document.getElementById('manEnd').value;
    if(!dateVal || !startVal || !endVal){
      alert('Completa fecha, hora de inicio y hora de fin.');
      return;
    }
    var startTs = new Date(dateVal+'T'+startVal+':00').getTime();
    var endTs = new Date(dateVal+'T'+endVal+':00').getTime();
    if(endTs <= startTs){ endTs += 86400000; }
    sessions.push({
      id: 'sess_'+Date.now(),
      start: startTs,
      end: endTs,
      duration: endTs - startTs
    });
    saveSessions();
    manualForm.classList.remove('open');
    document.getElementById('manStart').value = '';
    document.getElementById('manEnd').value = '';
    render();
  });

  // Mostrar el aviso de instalación solo si todavía no corre como app instalada
  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  if(!isStandalone()){
    installBanner.classList.add('show');
  }

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js').catch(function(e){
        console.warn('No se pudo registrar el service worker', e);
      });
    });
  }

  loadAll();
})();
</script>
</body>
</html>
